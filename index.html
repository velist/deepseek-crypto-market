<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Market — Real-time Prices</title>
<style>
  :root {
    --bg: #0b0f19; --card: #131a2b; --border: #1e2a3f;
    --text: #cdd6e4; --muted: #6b7c93; --green: #00d492;
    --red: #ff4757; --accent: #4f46e5;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .container { max-width:960px; margin:0 auto; padding:24px 20px; }

  header { display:flex; align-items:center; justify-content:space-between; padding:20px 0; border-bottom:1px solid var(--border); margin-bottom:28px; }
  header h1 { font-size:1.5rem; font-weight:700; letter-spacing:-0.02em; }
  header h1 span { color:var(--accent); }
  .header-right { text-align:right; }
  .global-mcap { font-size:1.1rem; font-weight:600; }
  .refresh-badge { font-size:0.75rem; color:var(--muted); background:var(--card); border:1px solid var(--border); padding:4px 10px; border-radius:6px; margin-top:6px; display:inline-block; }

  .lang-switch { display:inline-flex; gap:2px; margin-bottom:6px; }
  .lang-switch button { background:var(--card); border:1px solid var(--border); color:var(--muted); padding:3px 10px; border-radius:5px; cursor:pointer; font-size:0.75rem; transition:all .15s; }
  .lang-switch button.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .lang-switch button:hover:not(.active) { border-color:var(--accent); color:var(--text); }

  .search-bar { width:100%; padding:12px 18px; border-radius:10px; border:1px solid var(--border); background:var(--card); color:var(--text); font-size:0.95rem; margin-bottom:20px; outline:none; transition:border .2s; }
  .search-bar:focus { border-color:var(--accent); }
  .search-bar::placeholder { color:var(--muted); }

  .table-wrap { border-radius:14px; overflow:hidden; border:1px solid var(--border); }
  table { width:100%; border-collapse:collapse; }
  thead { background:#0d1525; }
  th { text-align:left; padding:14px 18px; font-size:0.8rem; text-transform:uppercase; letter-spacing:0.06em; color:var(--muted); font-weight:500; border-bottom:1px solid var(--border); }
  th:last-child, th:nth-child(3) { text-align:right; }
  td { padding:14px 18px; font-size:0.92rem; border-bottom:1px solid rgba(30,42,63,0.5); }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:rgba(79,70,229,0.06); }

  .coin-cell { display:flex; align-items:center; gap:12px; }
  .coin-icon { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.9rem; flex-shrink:0; }
  .coin-name { font-weight:600; }
  .coin-symbol { color:var(--muted); font-size:0.8rem; margin-left:6px; }

  .price { font-weight:600; text-align:right; }
  .price-cny { color:var(--muted); font-size:0.8rem; display:block; }

  .change { text-align:right; font-weight:600; font-size:0.9rem; }
  .change.up { color:var(--green); }
  .change.down { color:var(--red); }

  .mcap, .vol { text-align:right; color:var(--muted); font-size:0.85rem; }

  .loader { text-align:center; padding:60px 0; color:var(--muted); }
  .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to{transform:rotate(360deg);} }
  .error { text-align:center; padding:40px; color:var(--red); background:rgba(255,71,87,0.08); border-radius:12px; margin:20px 0; }

  footer { text-align:center; padding:32px 0; color:var(--muted); font-size:0.82rem; border-top:1px solid var(--border); margin-top:32px; }
  footer a { color:var(--accent); text-decoration:none; }

  @media(max-width:640px) {
    .container { padding:12px; }
    th,td { padding:10px 8px; font-size:0.8rem; }
    .mcap,.vol { display:none; }
    th:nth-child(5),th:nth-child(6),td:nth-child(5),td:nth-child(6) { display:none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🪙 <span>Crypto</span> Market</h1>
    <div class="header-right">
      <div class="lang-switch" id="langSwitch">
        <button data-lang="en" class="active">EN</button>
        <button data-lang="zh">中文</button>
      </div>
      <div class="global-mcap" id="globalMcap">—</div>
      <div class="refresh-badge" id="refreshBadge">⏳ ...</div>
    </div>
  </header>

  <input class="search-bar" id="search" placeholder="🔍 Search coin..." autocomplete="off">

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th id="thCoin">Coin</th>
          <th id="thPrice">Price</th>
          <th id="thChange">24h Change</th>
          <th id="thMcap">Market Cap</th>
          <th id="thVol">24h Volume</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="5"><div class="loader"><div class="spinner"></div><span id="loadingText">Loading...</span></div></td></tr>
      </tbody>
    </table>
  </div>

  <footer>
    <span id="footerText">Data from CoinGecko · Auto-refresh 30s · GitHub</span>
  </footer>
</div>

<script>
(function() {
'use strict';

var I18N = {
  en: {
    searchPlaceholder: '🔍 Search coin...',
    thCoin: 'Coin', thPrice: 'Price', thChange: '24h Change',
    thMcap: 'Market Cap', thVol: '24h Volume',
    loading: 'Loading...', noResult: 'No results',
    totalMcap: 'Total MCap',
    refresh: '{n}s to refresh',
    failPrefix: 'Failed',
    failHint: 'Check network or try later',
    footer: 'Data from <a href="https://www.coingecko.com/" target="_blank">CoinGecko</a> · Auto-refresh every 30s · <a href="https://github.com/velist/deepseek-crypto-market" target="_blank">GitHub</a>',
  },
  zh: {
    searchPlaceholder: '🔍 搜索币种...',
    thCoin: '币种', thPrice: '价格', thChange: '24h 涨跌',
    thMcap: '市值', thVol: '24h 成交量',
    loading: '加载中...', noResult: '无匹配结果',
    totalMcap: '总市值',
    refresh: '{n}秒后刷新',
    failPrefix: '加载失败',
    failHint: '请检查网络或稍后重试',
    footer: '数据来自 <a href="https://www.coingecko.com/" target="_blank">CoinGecko</a> · 每30秒自动刷新 · <a href="https://github.com/velist/deepseek-crypto-market" target="_blank">GitHub</a>',
  }
};

var lang = 'en';
function t(key, vars) {
  var dict = I18N[lang] || I18N.en;
  var s = dict[key] || key;
  if (vars) for (var k in vars) s = s.split('{'+k+'}').join(vars[k]);
  return s;
}

var REFRESH = 30;
var COINS = [
  { id:'bitcoin',      sym:'BTC',  name:'Bitcoin',       color:'#f7931a' },
  { id:'ethereum',     sym:'ETH',  name:'Ethereum',      color:'#627eea' },
  { id:'solana',       sym:'SOL',  name:'Solana',        color:'#9945ff' },
  { id:'ripple',       sym:'XRP',  name:'Ripple',        color:'#23292f' },
  { id:'cardano',      sym:'ADA',  name:'Cardano',       color:'#0033ad' },
  { id:'binancecoin',  sym:'BNB',  name:'Binance Coin',  color:'#f0b90b' },
  { id:'dogecoin',     sym:'DOGE', name:'Dogecoin',      color:'#c2a633' },
  { id:'tron',         sym:'TRX',  name:'TRON',          color:'#ef0027' },
  { id:'avalanche-2',  sym:'AVAX', name:'Avalanche',     color:'#e84142' },
  { id:'sui',          sym:'SUI',  name:'Sui',           color:'#4da2ff' },
];

var F = {
  usd: function(n) {
    if (n >= 1e12) return '$'+(n/1e12).toFixed(2)+'T';
    if (n >= 1e9)  return '$'+(n/1e9).toFixed(2)+'B';
    if (n >= 1e6)  return '$'+(n/1e6).toFixed(2)+'M';
    if (n >= 1)    return '$'+n.toLocaleString('en-US',{maximumFractionDigits:2});
    if (n >= 0.01) return '$'+n.toFixed(4);
    return '$'+n.toFixed(8);
  },
  cny: function(n) { return '\u00a5'+n.toLocaleString('en-US',{maximumFractionDigits:2}); },
  pct: function(p) { return (p>=0?'+':'')+p.toFixed(2)+'%'; }
};

var lastData = null;
var langReady = false;
var el = {};

function cacheDom() {
  el.search      = document.getElementById('search');
  el.thCoin      = document.getElementById('thCoin');
  el.thPrice     = document.getElementById('thPrice');
  el.thChange    = document.getElementById('thChange');
  el.thMcap      = document.getElementById('thMcap');
  el.thVol       = document.getElementById('thVol');
  el.loadingText = document.getElementById('loadingText');
  el.footerText  = document.getElementById('footerText');
  el.globalMcap  = document.getElementById('globalMcap');
  el.refreshBadge= document.getElementById('refreshBadge');
  el.tbody       = document.getElementById('tbody');
  el.langBtns    = document.querySelectorAll('#langSwitch button');
}

function applyLangUI() {
  if (!langReady) return;
  document.querySelector('html').lang = lang === 'zh' ? 'zh-CN' : 'en';
  document.title = lang === 'zh' ? 'Crypto Market — 实时行情' : 'Crypto Market — Real-time Prices';

  el.search.placeholder = t('searchPlaceholder');
  el.thCoin.textContent  = t('thCoin');
  el.thPrice.textContent = t('thPrice');
  el.thChange.textContent= t('thChange');
  el.thMcap.textContent  = t('thMcap');
  el.thVol.textContent   = t('thVol');
  el.loadingText.textContent = t('loading');
  el.footerText.innerHTML = t('footer');

  el.langBtns.forEach(function(b) {
    b.classList.toggle('active', b.dataset.lang === lang);
  });

  if (lastData) {
    renderTable(lastData, el.search.value);
  } else {
    el.loadingText.textContent = t('loading');
  }
}

function setLang(l) {
  if (l !== 'en' && l !== 'zh') l = 'en';
  lang = l;
  try { localStorage.setItem('crypto-market-lang', l); } catch(_) {}
  applyLangUI();
}

function fetchPrices() {
  var ids = COINS.map(function(c){return c.id;}).join(',');
  var u = 'https://api.coingecko.com/api/v3/simple/price?ids='+ids+'&vs_currencies=usd,cny&include_24hr_change=true&include_market_cap=true&include_24hr_vol=true';
  return fetch(u, {cache:'no-cache'}).then(function(r) {
    if (!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  });
}

function renderTable(data, filter) {
  lastData = data;
  var s = (filter||'').toLowerCase();
  var rows = COINS
    .map(function(c) {
      var d = data[c.id];
      return d ? { coin:c, pUSD:d.usd, pCNY:d.cny, chg:d.usd_24h_change||0, mcap:d.usd_market_cap, vol:d.usd_24h_vol } : null;
    })
    .filter(function(r) {
      return r && (!s || r.coin.sym.toLowerCase().indexOf(s)>=0 || r.coin.name.toLowerCase().indexOf(s)>=0);
    })
    .sort(function(a,b) { return b.mcap - a.mcap; });

  var total = rows.reduce(function(t,r) { return t + (r.mcap||0); }, 0);
  el.globalMcap.textContent = t('totalMcap') + ' ' + F.usd(total);

  if (rows.length === 0) {
    el.tbody.innerHTML = '<tr><td colspan="5"><div class="loader">'+t('noResult')+'</div></td></tr>';
    return;
  }

  el.tbody.innerHTML = rows.map(function(r) {
    var chgClass = r.chg >= 0 ? 'up' : 'down';
    return '<tr>'+
      '<td><div class="coin-cell">'+
        '<div class="coin-icon" style="background:'+r.coin.color+'20;color:'+r.coin.color+'">'+r.coin.sym[0]+'</div>'+
        '<div><span class="coin-name">'+r.coin.name+'</span><span class="coin-symbol">'+r.coin.sym+'</span></div>'+
      '</div></td>'+
      '<td><div class="price">'+F.usd(r.pUSD)+'</div><div class="price-cny">'+F.cny(r.pCNY)+'</div></td>'+
      '<td><div class="change '+chgClass+'">'+F.pct(r.chg)+'</div></td>'+
      '<td><div class="mcap">'+F.usd(r.mcap)+'</div></td>'+
      '<td><div class="vol">'+F.usd(r.vol)+'</div></td>'+
    '</tr>';
  }).join('');
}

function showError(msg) {
  el.tbody.innerHTML = '<tr><td colspan="5"><div class="error">'+t('failPrefix')+': '+msg+'<br><small>'+t('failHint')+'</small></div></td></tr>';
  el.refreshBadge.textContent = '\u274c ' + t('failPrefix');
}

function loadPrices() {
  fetchPrices().then(function(d) {
    renderTable(d, el.search.value);
    el.refreshBadge.textContent = '\ud83d\udd04 ' + t('refresh', {n: REFRESH});
  }).catch(function(e) {
    showError(e.message);
  });
}

document.addEventListener('DOMContentLoaded', function() {
  cacheDom();
  langReady = true;

  var params = new URLSearchParams(location.search);
  var urlLang = params.get('lang');
  var stored = null;
  try { stored = localStorage.getItem('crypto-market-lang'); } catch(_) {}
  var browserLang = (navigator.language||'').indexOf('zh')===0 ? 'zh' : 'en';
  setLang(urlLang || stored || browserLang);

  el.langBtns.forEach(function(b) {
    b.addEventListener('click', function() { setLang(b.dataset.lang); });
  });

  el.search.addEventListener('input', function() {
    if (lastData) renderTable(lastData, el.search.value);
  });

  loadPrices();
  var cd = REFRESH;
  setInterval(function() {
    cd--;
    if (cd <= 0) cd = REFRESH;
    el.refreshBadge.textContent = '\ud83d\udd04 ' + t('refresh', {n: cd});
  }, 1000);
  setInterval(loadPrices, REFRESH * 1000);
});

})();
</script>
</body>
</html>
