<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Market — Real-time Prices</title>
<style>
  :root {
    --bg: #0b0f19;
    --card: #131a2b;
    --border: #1e2a3f;
    --text: #cdd6e4;
    --muted: #6b7c93;
    --green: #00d492;
    --red: #ff4757;
    --accent: #4f46e5;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }
  .container { max-width: 960px; margin: 0 auto; padding: 24px 20px; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 28px;
  }
  header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
  header h1 span { color: var(--accent); }
  .header-right { text-align: right; }
  .global-mcap { font-size: 1.1rem; font-weight: 600; }
  .global-change { font-size: 0.85rem; }
  .global-change.up { color: var(--green); }
  .global-change.down { color: var(--red); }
  .refresh-badge {
    font-size: 0.75rem; color: var(--muted);
    background: var(--card); border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 6px; margin-top: 6px; display: inline-block;
  }

  .search-bar {
    width: 100%; padding: 12px 18px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--card); color: var(--text);
    font-size: 0.95rem; margin-bottom: 20px; outline: none; transition: border .2s;
  }
  .search-bar:focus { border-color: var(--accent); }
  .search-bar::placeholder { color: var(--muted); }

  .table-wrap { border-radius: 14px; overflow: hidden; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; }
  thead { background: #0d1525; }
  th {
    text-align: left; padding: 14px 18px; font-size: 0.8rem;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border);
  }
  th:last-child, th:nth-child(3) { text-align: right; }
  td {
    padding: 14px 18px; font-size: 0.92rem; border-bottom: 1px solid rgba(30,42,63,0.5);
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(79,70,229,0.06); }

  .coin-cell { display: flex; align-items: center; gap: 12px; }
  .coin-icon {
    width: 36px; height: 36px; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; font-weight: 700;
    font-size: 0.9rem; flex-shrink: 0;
  }
  .coin-name { font-weight: 600; }
  .coin-symbol { color: var(--muted); font-size: 0.8rem; margin-left: 6px; }

  .price { font-weight: 600; text-align: right; }
  .price-cny { color: var(--muted); font-size: 0.8rem; display: block; }

  .change { text-align: right; font-weight: 600; font-size: 0.9rem; }
  .change.up { color: var(--green); }
  .change.down { color: var(--red); }

  .mcap, .vol { text-align: right; color: var(--muted); font-size: 0.85rem; }

  .loader {
    text-align: center; padding: 60px 0; color: var(--muted);
  }
  .spinner {
    width: 40px; height: 40px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error {
    text-align: center; padding: 40px; color: var(--red);
    background: rgba(255,71,87,0.08); border-radius: 12px; margin: 20px 0;
  }

  footer {
    text-align: center; padding: 32px 0; color: var(--muted); font-size: 0.82rem;
    border-top: 1px solid var(--border); margin-top: 32px;
  }
  footer a { color: var(--accent); text-decoration: none; }

  @media (max-width: 640px) {
    .container { padding: 12px; }
    th, td { padding: 10px 8px; font-size: 0.8rem; }
    .mcap, .vol { display: none; }
    th:nth-child(5), th:nth-child(6), td:nth-child(5), td:nth-child(6) { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🪙 <span>Crypto</span> Market</h1>
    <div class="header-right">
      <div class="global-mcap" id="globalMcap">—</div>
      <div class="global-change" id="globalChange">—</div>
      <div class="refresh-badge" id="refreshBadge">⏳ Loading...</div>
    </div>
  </header>

  <input class="search-bar" id="search" placeholder="🔍 Search coin..." autocomplete="off">

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Coin</th>
          <th>Price</th>
          <th>24h Change</th>
          <th>Market Cap</th>
          <th>24h Volume</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="5"><div class="loader"><div class="spinner"></div>Loading...</div></td></tr>
      </tbody>
    </table>
  </div>

  <footer>
    Data from <a href="https://www.coingecko.com/" target="_blank">CoinGecko</a> ·
    Auto-refresh every 30s ·
    <a href="https://github.com/velist/deepseek-crypto-market" target="_blank">GitHub</a>
  </footer>
</div>

<script>
const REFRESH = 30;
const COINS = [
  { id:'bitcoin',      sym:'BTC',  name:'Bitcoin',       color:'#f7931a' },
  { id:'ethereum',     sym:'ETH',  name:'Ethereum',      color:'#627eea' },
  { id:'solana',       sym:'SOL',  name:'Solana',        color:'#9945ff' },
  { id:'ripple',       sym:'XRP',  name:'Ripple',        color:'#23292f' },
  { id:'cardano',      sym:'ADA',  name:'Cardano',       color:'#0033ad' },
  { id:'binancecoin',  sym:'BNB',  name:'Binance Coin',  color:'#f0b90b' },
  { id:'dogecoin',     sym:'DOGE', name:'Dogecoin',      color:'#c2a633' },
  { id:'tron',         sym:'TRX',  name:'TRON',          color:'#ef0027' },
  { id:'avalanche-2',  sym:'AVAX', name:'Avalanche',     color:'#e84142' },
  { id:'sui',          sym:'SUI',  name:'Sui',           color:'#4da2ff' },
];

const F = {
  usd(n) {
    if (n >= 1e12) return '$'+(n/1e12).toFixed(2)+'T';
    if (n >= 1e9)  return '$'+(n/1e9).toFixed(2)+'B';
    if (n >= 1e6)  return '$'+(n/1e6).toFixed(2)+'M';
    if (n >= 1)    return '$'+n.toLocaleString('en-US',{maximumFractionDigits:2});
    if (n >= 0.01) return '$'+n.toFixed(4);
    return '$'+n.toFixed(8);
  },
  cny(n) { return '¥'+n.toLocaleString('en-US',{maximumFractionDigits:2}); },
  pct(p) { return (p>=0?'+':'')+p.toFixed(2)+'%'; }
};

async function fetchPrices() {
  const ids = COINS.map(c=>c.id).join(',');
  const u = `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd,cny&include_24hr_change=true&include_market_cap=true&include_24hr_vol=true`;
  const r = await fetch(u, {cache:'no-cache'});
  if (!r.ok) throw Error(`HTTP ${r.status}`);
  return r.json();
}

let lastData = null;

function render(data, filter) {
  lastData = data;
  const s = (filter||'').toLowerCase();
  const rows = COINS
    .map(c=>{const d=data[c.id];return d?{...c,pUSD:d.usd,pCNY:d.cny,chg:d.usd_24h_change||0,mcap:d.usd_market_cap,vol:d.usd_24h_vol}:null;})
    .filter(r=>r&&(!s||r.sym.toLowerCase().includes(s)||r.name.toLowerCase().includes(s)))
    .sort((a,b)=>b.mcap-a.mcap);

  const total = rows.reduce((t,r)=>t+(r.mcap||0),0);
  document.getElementById('globalMcap').textContent = 'Total MCap ' + F.usd(total);

  document.getElementById('tbody').innerHTML = rows.length
    ? rows.map(r=>`
      <tr>
        <td><div class="coin-cell">
          <div class="coin-icon" style="background:${r.color}20;color:${r.color}">${r.sym[0]}</div>
          <div><span class="coin-name">${r.name}</span><span class="coin-symbol">${r.sym}</span></div>
        </div></td>
        <td><div class="price">${F.usd(r.pUSD)}</div><div class="price-cny">${F.cny(r.pCNY)}</div></td>
        <td><div class="change ${r.chg>=0?'up':'down'}">${F.pct(r.chg)}</div></td>
        <td><div class="mcap">${F.usd(r.mcap)}</div></td>
        <td><div class="vol">${F.usd(r.vol)}</div></td>
      </tr>`).join('')
    : '<tr><td colspan="5"><div class="loader">No results</div></td></tr>';
}

async function load() {
  try {
    const d = await fetchPrices();
    render(d, document.getElementById('search').value);
    document.getElementById('refreshBadge').textContent = `🔄 ${REFRESH}s to refresh`;
  } catch(e) {
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="5"><div class="error">Failed: ${e.message}<br><small>Check network or try later</small></div></td></tr>`;
    document.getElementById('refreshBadge').textContent = '❌ Load failed';
  }
}

let cd = REFRESH;
setInterval(()=>{cd--;if(cd<=0)cd=REFRESH;document.getElementById('refreshBadge').textContent=`🔄 ${cd}s to refresh`;},1000);

document.getElementById('search').addEventListener('input', ()=>{
  if (lastData) render(lastData, document.getElementById('search').value);
});

load();
setInterval(load, REFRESH*1000);
</script>
</body>
</html>
